            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }
            .medical-shadow {
                box-shadow: 0px 10px 30px rgba(13, 35, 87, 0.08);
            }
            .glass-card {
                background: rgba(255, 255, 255, 0.6);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.8);

    <body

        <!-- TopNavBar -->

            class="bg-surface dark:bg-inverse-surface text-primary dark:text-inverse-primary font-label-md text-label-md sticky top-0 z-50 border-b border-surface-variant"
        >
            <div

            >
                <!-- Brand -->

                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_Pv0tBmQaitJDbv_skivf1rhJ3OA4uiAh9BpB9jfO_ZNuLOnQFQhubvECphiNp83uIkPY1wHWy909MowGHmgvPHrobnhA-MLKToRhAODLeC1m1rv5DzQnvkQ1AR2abHXcRGF8YWMNwoyuE1W77-2SOMss04blzqhhrohoMJ-FO1WzK4qH77yIupS_eqVwUP31OPq-RZ7RFdREGjRzgdDN_JVNc3XeH7q7xlGpPS5_HSIJHh86qkJQ_qD09OkKKIqgKJLCxdAV8w-u"

                    <a

                        href="#"
                        >Renew Visit</a
                    >
                    <a
                        class="text-on-surface-variant dark:text-on-tertiary-container hover:text-primary hover:text-secondary transition-colors duration-200 cursor-pointer active:opacity-70"

                        >Visit Book</a

                    >

                        <div>

                            >
                                New Patient
